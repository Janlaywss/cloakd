name: Release

# Triggers on any push (including merge commits) to the `release` branch.
# Typical flow: bump package.json version on a dev branch, merge into
# `release`, push. CI reads the version, refuses if the tag already
# exists, builds, zips, and publishes a GitHub Release.
#
# We intentionally ship only .zip (not .crx). Chrome blocks sideloaded
# .crx files with CRX_REQUIRED_PROOF_MISSING since v75 regardless of
# signature validity — a Web Store–issued proof of origin is mandatory
# for .crx installs and we don't have one. `.zip` + Load unpacked
# works identically once loaded, without any proof.
on:
  push:
    branches:
      - release

# action-gh-release needs write access to create tags / releases.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for tag lookup and auto-generated release notes.
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Verify tag does not already exist
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists. Bump the version in package.json before merging to the release branch."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Create zip archive
        working-directory: build/chrome-mv3-prod
        run: |
          zip -r "$GITHUB_WORKSPACE/cloakd-v${{ steps.version.outputs.version }}.zip" .

      - name: Sanity check output
        run: |
          ls -lh "cloakd-v${{ steps.version.outputs.version }}.zip"
          unzip -l "cloakd-v${{ steps.version.outputs.version }}.zip" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Cloakd v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Built automatically from `release` branch at ${{ github.sha }}.

            ### Install

            1. Download `cloakd-v${{ steps.version.outputs.version }}.zip` below
            2. Unzip it to a **permanent** folder (e.g. `~/Applications/cloakd/`) — the folder must stay where you put it, Chrome remembers the absolute path
            3. Open `chrome://extensions` → enable **Developer mode** → **Load unpacked** → select the unzipped folder
            4. Visit https://chatgpt.com

            **Why no `.crx`?** Chrome blocks sideloaded `.crx` files with `CRX_REQUIRED_PROOF_MISSING` since v75. See the [README](https://github.com/${{ github.repository }}#install) for details.
          files: |
            cloakd-v${{ steps.version.outputs.version }}.zip
